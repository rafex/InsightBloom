server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        image/svg+xml application/xml;

    # ── Caché de assets estáticos (Vite genera hashes en el nombre) ─────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── API routing → servicios backend ─────────────────────────────────────
    #    El prefijo /api/{servicio} se elimina antes de hacer proxy,
    #    coincidiendo con el proxy de desarrollo definido en vite.config.js

    location /api/users/ {
        rewrite      ^/api/users/(.*)$ /$1 break;
        proxy_pass   http://insightbloom-users:8081;
        include      /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ingest/ {
        rewrite      ^/api/ingest/(.*)$ /$1 break;
        proxy_pass   http://insightbloom-ingest:8082;
        include      /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/query/ {
        rewrite      ^/api/query/(.*)$ /$1 break;
        proxy_pass   http://insightbloom-query:8083;
        include      /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/moderation/ {
        rewrite      ^/api/moderation/(.*)$ /$1 break;
        proxy_pass   http://insightbloom-moderation:8084;
        include      /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── SPA catch-all (Vue Router history mode) ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
