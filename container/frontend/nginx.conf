server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compresión ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        image/svg+xml application/xml;

    # ── Headers proxy comunes ────────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Connection        "";
    proxy_read_timeout  60s;
    proxy_connect_timeout 5s;

    # ── API routing ── replica exacta de los proxies de vite.config.js ──────
    #    vite: path.replace(/^\/api\/users/, '')   → nginx: rewrite sin /

    location /api/users {
        rewrite ^/api/users(/.*)$ $1 break;
        rewrite ^/api/users$      /  break;
        proxy_pass http://insightbloom-users:8081;
    }

    location /api/ingest {
        rewrite ^/api/ingest(/.*)$ $1 break;
        rewrite ^/api/ingest$      /  break;
        proxy_pass http://insightbloom-ingest:8082;
    }

    location /api/query {
        rewrite ^/api/query(/.*)$ $1 break;
        rewrite ^/api/query$      /  break;
        proxy_pass http://insightbloom-query:8083;
    }

    location /api/moderation {
        rewrite ^/api/moderation(/.*)$ $1 break;
        rewrite ^/api/moderation$      /  break;
        proxy_pass http://insightbloom-moderation:8084;
    }

    # ── Caché de assets estáticos (Vite hashea los nombres de archivo) ───────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA catch-all (Vue Router en modo history) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
