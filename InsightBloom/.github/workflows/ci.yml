name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  services:
    name: Build & Test Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build services
        run: ./mvnw -f pom.xml clean package -DskipTests

      - name: Test services
        run: ./mvnw -f services/pom.xml test

  frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 25
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: apps/insightbloom-web/package-lock.json

      - name: Install frontend deps
        run: npm --prefix apps/insightbloom-web install

      - name: Build frontend
        run: npm --prefix apps/insightbloom-web run build

      - name: Test frontend
        run: npm --prefix apps/insightbloom-web run test
